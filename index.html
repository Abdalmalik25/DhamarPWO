  <body>
    <div id="root">
      <!-- مؤشر التحميل الأولي - يختفي تلقائياً بعد تحميل React -->
      <div
        id="initial-loader"
        style="
          position: fixed;
          inset: 0;
          z-index: 99999;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: linear-gradient(135deg, #0a1628, #0f1f38, #132744);
          font-family: 'Cairo', 'Tajawal', system-ui, sans-serif;
          direction: rtl;
          transition: opacity 0.6s ease, visibility 0.6s ease;
          opacity: 1;
          visibility: visible;
        "
      >
        <style>
          @keyframes loader-spin {
            0% {
              transform: rotate(0deg);
            }
            100% {
              transform: rotate(360deg);
            }
          }
          @keyframes loader-shimmer {
            0%,
            100% {
              background-position: 0% 50%;
            }
            50% {
              background-position: 100% 50%;
            }
          }
          @keyframes loader-fade {
            0%,
            100% {
              opacity: 0.6;
            }
            50% {
              opacity: 1;
            }
          }
          .ls {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: loader-spin 1s linear infinite;
            margin-bottom: 24px;
          }
          .lb {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
          }
          .lf {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #d4af37, #fbbf24, #d4af37);
            background-size: 200% 100%;
            border-radius: 4px;
            animation: loader-shimmer 1.5s ease infinite;
          }
          .lt {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            animation: loader-fade 2s ease-in-out infinite;
          }
          .lbn {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 4px;
          }
          .lsb {
            color: rgba(212, 175, 55, 0.7);
            font-size: 11px;
            margin-bottom: 16px;
          }
          .lver {
            color: rgba(255, 255, 255, 0.2);
            font-size: 9px;
            margin-top: 24px;
            font-family: monospace;
          }
        </style>
        <div class="ls"></div>
        <div class="lbn">مكتب الأشغال العامة والطرق</div>
        <div class="lsb">محافظة ذمار - الجمهورية اليمنية</div>
        <div class="lb"><div class="lf"></div></div>
        <div class="lt">جاري تحميل البوابة الإلكترونية...</div>
        <div class="lver">v5.0.0</div>
      </div>
    </div>
